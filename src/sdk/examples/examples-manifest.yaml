# SDK Examples Manifest
#
# Categorizes all examples for CI execution. Used by:
#   - .github/workflows/zxc-run-examples.yaml
#   - run_examples.sh
#
# Categories:
#   offline - No network required. Runs in every CI job, must always pass.
#   network - Requires a live Hiero node (solo in CI). OPERATOR_ID / OPERATOR_KEY
#             must be present in a .env file or as environment variables.
#   skip    - Not suitable for automated CI (interactive stdin, infinite loop, etc.)
#
# Fields:
#   name        - Human-readable example name (matches source file without .cpp)
#   binary      - CMake target name (hiero-sdk-cpp-<kebab-case>)
#   category    - offline | network | skip
#   skip_reason - Required when category is skip
#   timeout     - Per-example timeout in seconds (default: 60)
#   solo_ready  - (network only) true if the example uses Client::forName(networkName)
#                 and will work against the local solo node. false if it hardcodes
#                 Client::forTestnet() and requires real testnet credentials.
#   description - What the example demonstrates

examples:

  # ─── OFFLINE ──────────────────────────────────────────────────────────────
  # These examples perform only local cryptographic or parsing operations.
  # They require no network and no operator credentials.

  - name: AccountCreationWaysExample
    binary: hiero-sdk-cpp-account-creation-ways-example
    category: offline
    timeout: 30
    description: >
      Demonstrates the four account ID representations (shard.realm.num,
      public-key alias, long-zero, EVM address). Pure local operations.

  - name: ConstructClientExample
    binary: hiero-sdk-cpp-construct-client-example
    category: offline
    timeout: 30
    description: >
      Constructs Client objects for various networks and closes them immediately.
      No transactions are executed; the HIERO_NETWORK env var is read but the
      example does not make any RPC calls, so it is effectively network-free.
    env:
      HIERO_NETWORK: testnet

  - name: GenerateKeyExample
    binary: hiero-sdk-cpp-generate-key-example
    category: offline
    timeout: 30
    description: >
      Generates an ED25519 and an ECDSAsecp256k1 key pair and prints them.
      Pure cryptographic operation; no network calls.

  - name: GeneratePrivateKeyFromMnemonicExample
    binary: hiero-sdk-cpp-generate-private-key-from-mnemonic-example
    category: offline
    timeout: 30
    description: >
      Derives ED25519 and ECDSA keys from randomly generated 12- and 24-word
      BIP39 mnemonics. Pure local crypto; no network calls.

  - name: GeneratePrivateKeyFromSpecificMnemonicExample
    binary: hiero-sdk-cpp-generate-private-key-from-specific-mnemonic-example
    category: offline
    timeout: 30
    description: >
      Derives an ED25519 key from a fixed mnemonic and compares the DER output
      against a known Java-SDK reference value. No network calls.

  - name: VersionExample
    binary: hiero-sdk-cpp-version-example
    category: offline
    timeout: 30
    description: Prints PROJECT_VERSION and PROJECT_DESCRIPTION. No network calls.

  # ─── SKIP ─────────────────────────────────────────────────────────────────
  # These examples cannot run unattended in CI.

  - name: ConsensusPubSubExample
    binary: hiero-sdk-cpp-consensus-pub-sub-example
    category: skip
    skip_reason: infinite-loop
    description: >
      Subscribes to an HCS topic and publishes messages in an infinite loop.
      Requires an explicit kill signal; not suitable for automated CI.

  - name: ConsensusPubSubChunkedExample
    binary: hiero-sdk-cpp-consensus-pub-sub-chunked-example
    category: skip
    skip_reason: infinite-loop
    description: >
      Sends large chunked messages to an HCS topic in an infinite loop.

  - name: ConsensusPubSubWithSubmitKeyExample
    binary: hiero-sdk-cpp-consensus-pub-sub-with-submit-key-example
    category: skip
    skip_reason: infinite-loop
    description: >
      PubSub with a submit key; runs in an infinite loop.

  - name: ValidateChecksumExample
    binary: hiero-sdk-cpp-validate-checksum-example
    category: skip
    skip_reason: interactive-stdin
    description: >
      Reads account IDs interactively from stdin in a while(true) loop.
      Cannot be automated without piping input indefinitely.

  # ─── NETWORK ──────────────────────────────────────────────────────────────
  # These examples require a running Hiero node and operator credentials.
  # In CI they run against the solo local network.
  #
  # solo_ready: true  → uses Client::forName(networkName) – works with solo.
  # solo_ready: false → hardcodes Client::forTestnet() – needs real testnet
  #                     credentials or a code change to support solo.
  #
  # NOTE: A follow-up task should migrate solo_ready: false examples to use
  #       Client::forName(std::getenv("HIERO_NETWORK")) so they run cleanly
  #       against solo in CI.

