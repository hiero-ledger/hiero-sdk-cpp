name: Feature Request
description: Propose a new capability for the Hiero C++ SDK
labels: ['status: awaiting triage']
type: Feature
body:
  - type: markdown
    attributes:
      value: |
        ---
        ## Thanks for proposing a feature! 💡

        We appreciate ideas that help make the Hiero C++ SDK more capable and useful.

        Before submitting:
        - Search [existing issues](https://github.com/hiero-ledger/hiero-sdk-cpp/issues) to see if this has been proposed before
        - For large or protocol-level changes, consider opening a [Hiero Improvement Proposal](https://github.com/hiero-ledger/hiero-improvement-proposals) or starting a [GitHub Discussion](https://github.com/hiero-ledger/hiero-sdk-cpp/discussions) first

        A well-described feature request makes it much easier for maintainers and the project team to evaluate, plan, and implement.
        ---

  - type: textarea
    id: problem
    attributes:
      label: 👾 Problem Description
      description: |
        What problem are you trying to solve? Describe the need or gap clearly.
        Focus on the problem itself — the proposed solution comes next.
        If you already have a specific solution in mind, describe it under "Proposed Solution" — just include a brief summary of the need here.
      value: |
        Describe the problem here.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Problem (hidden in submission) -->
        ## 👾 Problem — Example (C++)

        The Hiero C++ SDK doesn't provide a way to batch multiple queries into a single network
        round-trip. Applications that need to fetch balances and transaction records for many
        accounts must send individual queries, leading to high latency and unnecessary network
        overhead in production environments.

  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: |
        Describe the feature you'd like to see. What would the API or behavior look like?
        Include examples, pseudocode, or sketches that help illustrate the idea.
      value: |
        Describe the proposed solution here.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Solution (hidden in submission) -->
        ## 💡 Proposed Solution — Example (C++)

        Add a `BatchQuery` class that accepts multiple query objects and executes them in parallel,
        returning all results when the last one completes:

        ```cpp
        auto results = BatchQuery()
            .add(AccountBalanceQuery().setAccountId(id1))
            .add(AccountBalanceQuery().setAccountId(id2))
            .add(AccountInfoQuery().setAccountId(id3))
            .execute(client);

        // Access results by index
        auto balance1 = results.get<AccountBalance>(0);
        auto info3    = results.get<AccountInfo>(2);
        ```

        Each result would be accessible by index. The implementation should preserve existing
        query behavior and stay compatible with the current `Query<T>` hierarchy.

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: |
        What other approaches did you consider? Why is the proposed solution preferred?
        Write "None" if no alternatives were considered.
      value: |
        Describe alternatives here, or write "None" if not applicable.
    validations:
      required: false

  - type: textarea
    id: implementation-notes
    attributes:
      label: 👩‍💻 Implementation Notes
      description: |
        Any hints about where or how this might be implemented in the SDK?
        This is optional — maintainers will fill in detailed implementation guidance during triage.
      value: |
        Optional. Add any hints here.
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        <!-- Example for Implementation Notes (hidden in submission) -->
        ## 👩‍💻 Implementation Notes — Example (C++)

        This would likely build on the existing `Query<T>` base class in:
        ```
        src/sdk/main/include/Query.h
        src/sdk/main/src/Query.cc
        ```

        The `BatchQuery` class could use `std::async` or the existing gRPC async infrastructure
        to parallelize the requests, similar to how the current execution layer works.

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: ✔️ Acceptance Criteria
      description: What does "done" look like for this feature?
      value: |
        - [ ] The feature works as described in the proposal
        - [ ] Unit and/or integration tests are added
        - [ ] At least one example is added or updated to demonstrate the feature
        - [ ] Public API documentation (header comments) is complete
        - [ ] All existing tests continue to pass
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 🤔 Additional Information
      description: |
        Links to prior art, related HIPs, discussions, or any other context that might
        be helpful for evaluating this request.
      value: |
        Optional.
    validations:
      required: false
