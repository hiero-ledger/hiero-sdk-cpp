name: Bug Report
description: Report a bug or unexpected behavior in the Hiero C++ SDK
labels: ['status: awaiting triage']
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        ---
        ## Thanks for submitting a bug report! 🐛

        We appreciate your help in making the Hiero C++ SDK better.

        Before submitting:
        - Search [existing issues](https://github.com/hiero-ledger/hiero-sdk-cpp/issues) to check if this has been reported before
        - For security vulnerabilities, please follow our [responsible disclosure process](https://hedera.com/bounty) instead of opening a public issue

        A detailed bug report helps us identify and fix the problem faster. Please be as specific as possible.
        ---

  - type: textarea
    id: description
    attributes:
      label: 👾 Description of the Issue
      description: |
        Briefly describe what is wrong. What did you observe, and what did you expect instead?
        Include relevant file paths, class names, or method names if you know them.
      value: |
        Describe the bug here.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Description (hidden in submission) -->
        ## 👾 Description — Example (C++)

        When calling `client.setDefaultMaxTransactionFee()` with a `Hbar` value of `0`, the SDK
        silently ignores the value and continues using the previously configured fee. The method
        should either accept `0` as a valid fee cap or throw a clear error.

        Relevant files:
        ```
        src/sdk/main/include/Client.h
        src/sdk/main/src/Client.cc
        ```

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce
      description: |
        Provide clear, numbered steps that consistently reproduce the issue.
        Include any relevant code, command-line invocations, or configuration.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Steps (hidden in submission) -->
        ## 🔁 Steps to Reproduce — Example (C++)

        ```cpp
        auto client = Client::forTestnet();
        client.setOperator(MY_ACCOUNT_ID, MY_PRIVATE_KEY);
        client.setDefaultMaxTransactionFee(Hbar(0));

        // Expect this to fail due to zero max fee, but it succeeds
        auto response = TransferTransaction()
            .addHbarTransfer(MY_ACCOUNT_ID, Hbar(-1))
            .addHbarTransfer(RECIPIENT_ID, Hbar(1))
            .execute(client);
        ```

        Running the above always succeeds, even though a max fee of `0` should prohibit it.

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behavior
      description: What should have happened? Even a simple "I expected no error / no crash / the function to return a value" is helpful.
      value: |
        Describe the expected behavior here.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Expected Behavior (hidden in submission) -->
        ## ✅ Expected Behavior — Example

        `client.setDefaultMaxTransactionFee(Hbar(0))` should either:
        - Accept `0` as a valid cap and reject any transaction whose actual fee exceeds `0`
        - Throw a `std::invalid_argument` with a descriptive message explaining that `0` is not valid

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behavior
      description: |
        What actually happened? Include error messages, stack traces, or unexpected output.
      value: |
        Describe the actual behavior here.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        <!-- Example for Actual Behavior (hidden in submission) -->
        ## ❌ Actual Behavior — Example

        The fee cap is silently ignored. No error is thrown, and the transaction executes
        as if `setDefaultMaxTransactionFee` was never called.

        Console output:
        ```
        [INFO] Transaction submitted: 0.0.1234@1700000000.000000000
        [INFO] Receipt status: SUCCESS
        ```

  - type: textarea
    id: environment
    attributes:
      label: 🌐 Environment
      description: Provide details about the environment where the bug occurred.
      value: |
        - SDK version:
        - Operating system:
        - Compiler and version (e.g. GCC 13.2, Clang 17, MSVC 19.38):
        - Hiero network (mainnet / testnet / previewnet / solo):
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: ✔️ Acceptance Criteria
      description: These are the standard acceptance criteria for a bug fix. You can leave them as-is — a maintainer will refine them during triage if needed.
      value: |
        - [ ] The described behavior is no longer reproducible
        - [ ] A regression test is added that fails before the fix and passes after
        - [ ] No unrelated behavior or API changes are introduced
        - [ ] All existing tests continue to pass
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 🤔 Additional Information
      description: |
        Anything else that might help: logs, screenshots, related issues, bisected commits, etc.
      value: |
        Optional.
    validations:
      required: false
